{% extends 'core/base.html' %}

{% block title %}Календарь{% endblock %}

{% block topbar %}
<div class="topbar">
    <div style="display: flex; align-items: center; gap: 16px; position: relative;">
        <h1 class="topbar__title" id="topbar-title">Календарь</h1>
    </div>
    {% if user.is_authenticated %}
        <div class="topbar__actions">
            <button class="cal-view-btn is-active" data-view="month" id="btn-month">Месяц</button>
            <button class="cal-view-btn" data-view="week" id="btn-week">Неделя</button>
            <a href="{% url 'task_create' %}" class="topbar__action-button">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Новая задача
            </a>
        </div>
    {% endif %}
</div>
{% endblock %}

{% block content %}
<div class="cal-page">

    <!-- ── Навигация календаря ── -->
    <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev" aria-label="Предыдущий">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
        </button>
        <h2 class="cal-nav__title" id="cal-title"></h2>
        <button class="cal-nav-btn" id="cal-next" aria-label="Следующий">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 1 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
        </button>
        <button class="cal-today-btn" id="cal-today">Сегодня</button>
    </div>

    <div class="cal-body">

        <!-- ── Сетка календаря ── -->
        <div class="cal-grid-wrap" id="cal-grid-wrap">

            <!-- Дни недели -->
            <div class="cal-weekdays" id="cal-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span>
                <span>Чт</span><span>Пт</span>
                <span class="cal-weekend">Сб</span>
                <span class="cal-weekend">Вс</span>
            </div>

            <!-- Ячейки -->
            <div class="cal-grid" id="cal-grid"></div>
        </div>

        <!-- ── Боковая панель ── -->
        <aside class="cal-sidebar" id="cal-sidebar">
            <div class="cal-sidebar__header">
                <div class="cal-sidebar__date" id="sidebar-date">Выбери день</div>
                <button class="cal-sidebar__close" id="sidebar-close" aria-label="Закрыть">×</button>
            </div>
            <div class="cal-sidebar__body" id="sidebar-body">
                <p class="cal-sidebar__empty">Нажми на день в календаре</p>
            </div>
        </aside>
    </div>
</div>

<!-- ── Модалка задачи ── -->
<div class="modal-backdrop" id="task-modal" aria-hidden="true">
    <div class="modal-dialog modal-dialog--task panel panel--glass" role="dialog" aria-modal="true">
        <div class="panel__body task-modal__body" id="task-modal-body"></div>
    </div>
</div>

<style>
    .cal-page {
        display: flex;
        flex-direction: column;
        gap: 0;
        height: calc(100vh - 140px);
        min-height: 600px;
    }

    /* ── Calendar Nav bar ── */
    .cal-nav {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 0 16px;
    }

    .cal-nav__title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text);
        min-width: 220px;
        text-align: center;
    }

    .cal-nav-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition), border-color var(--transition);
        flex-shrink: 0;
    }

    .cal-nav-btn svg { width: 18px; height: 18px; }

    .cal-nav-btn:hover {
        background: var(--surface);
        border-color: var(--border-strong);
    }

    .cal-view-btn {
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text-secondary);
        font: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .cal-view-btn.is-active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
    }

    .cal-today-btn {
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition), border-color var(--transition);
    }

    .cal-today-btn:hover { background: var(--surface); }

    /* ── Body layout ── */
    .cal-body {
        flex: 1;
        display: flex;
        gap: 16px;
        min-height: 0;
        overflow: hidden;
    }

    /* ── Grid wrap ── */
    .cal-grid-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        border: 1.5px solid var(--border-color);
        border-radius: var(--radius-lg);
        background: var(--bg);
        overflow: hidden;
    }

    .cal-weekdays {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        border-bottom: 1.5px solid var(--border-color);
        background: var(--surface);
    }

    .cal-weekdays span {
        text-align: center;
        padding: 10px 4px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-secondary);
    }

    .cal-weekdays .cal-weekend { color: color-mix(in srgb, var(--danger) 70%, var(--text-secondary)); }

    /* Month grid */
    .cal-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        overflow-y: auto;
    }

    .cal-grid--week {
        grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .cal-cell {
        border-right: 1.5px solid var(--border-color);
        border-bottom: 1.5px solid var(--border-color);
        padding: 6px;
        min-height: 88px;
        cursor: pointer;
        transition: background var(--transition);
        overflow: hidden;
        position: relative;
        background: var(--surface);
    }

    .cal-cell:nth-child(7n) { border-right: none; }

    .cal-cell:hover { background: color-mix(in srgb, var(--primary) 4%, var(--surface)); }

    .cal-cell.is-today { background: color-mix(in srgb, var(--primary) 6%, var(--surface)); }

    .cal-cell.is-selected { background: color-mix(in srgb, var(--primary) 10%, var(--surface)); }

    .cal-cell.is-other-month { background: var(--bg); }
    .cal-cell.is-other-month .cal-cell__num { opacity: 0.32; }

    .cal-cell__num {
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        margin-bottom: 4px;
        flex-shrink: 0;
    }

    .cal-cell.is-today .cal-cell__num {
        background: var(--primary);
        color: #fff;
    }

    .cal-cell__events {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .cal-chip {
        display: block;
        padding: 2px 6px;
        border-radius: 5px;
        font-size: 0.74rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        transition: opacity var(--transition);
        color: var(--text);
        border: 1px solid transparent;
    }

    .cal-chip:hover { opacity: 0.82; }
    .cal-chip--done { opacity: 0.45; text-decoration: line-through; }

    .cal-chip--more {
        background: var(--surface);
        color: var(--text-secondary);
        border: 1px solid var(--border);
        text-align: center;
    }

    /* Week view cells */
    .cal-cell--week {
        min-height: 120px;
        border-right: 1.5px solid var(--border-color);
        border-bottom: 1.5px solid var(--border-color);
        background: var(--surface);
    }
    .cal-cell--week:nth-child(7n) { border-right: none; }
    .cal-cell--week:hover { background: color-mix(in srgb, var(--primary) 4%, var(--surface)); }
    .cal-cell--week.is-today { background: color-mix(in srgb, var(--primary) 6%, var(--surface)); }

    /* ── Sidebar ── */
    .cal-sidebar {
        width: 300px;
        flex-shrink: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, var(--surface), var(--surface));

        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: width var(--transition), opacity var(--transition);
    }

    .cal-sidebar.is-hidden {
        width: 0;
        opacity: 0;
        border-width: 0;
        pointer-events: none;
    }

    .cal-sidebar__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .cal-sidebar__date {
        font-size: 0.96rem;
        font-weight: 700;
        color: var(--text);
    }

    .cal-sidebar__close {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--text-secondary);
        font: inherit;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition), color var(--transition);
    }

    .cal-sidebar__close:hover { background: color-mix(in srgb, var(--text) 8%, transparent); color: var(--text); }

    .cal-sidebar__body {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .cal-sidebar__empty {
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-align: center;
        margin: auto 0;
        padding: 24px 0;
    }

    .cal-task-card {
        border: 1px solid var(--border-color);
        border-left-width: 4px;
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        background: var(--surface);
        cursor: pointer;
        transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        display: grid;
        gap: 6px;
    }

    .cal-task-card:hover { background: var(--surface); transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .cal-task-card--done { opacity: 0.5; }

    .cal-task-card__title {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        margin: 0;
    }

    .cal-task-card--done .cal-task-card__title { text-decoration: line-through; }

    .cal-task-card__meta {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }

    .cal-task-card__time {
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .cal-cat-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 999px;
    }

    .cal-cat-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        flex-shrink: 0;
    }

    /* ── Task modal (copy of home.html) ── */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(9, 13, 20, 0.48);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.18s ease, visibility 0.18s ease;
        z-index: 200;
    }
    .modal-backdrop.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
    }
    .modal-dialog {
        width: min(100%, 520px);
        border-radius: var(--radius-lg);
    }
    .modal-dialog--task {
        width: min(100%, 760px);
        max-height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
    }
    .task-modal__body {
        overflow-y: auto;
        max-height: calc(100vh - 40px);
    }
    .task-modal__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
        position: sticky;
        top: 0;
        background: var(--surface);
        padding-bottom: 8px;
        z-index: 2;
    }
    .task-modal__header-main {
        flex: 1;
    }
    .task-modal__title {
        margin: 8px 0 4px;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
    }
    .task-modal__time {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-secondary);
    }
    .modal-close-button {
        width: 38px;
        height: 38px;
        border: 1px solid var(--border-color);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text-secondary);
        font: inherit;
        font-size: 1.25rem;
        line-height: 1;
        cursor: pointer;
        transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        flex: 0 0 auto;
    }
    .modal-close-button:hover {
        background: var(--surface);
        color: var(--text);
    }
    .task-modal__content {
        padding: 20px 20px;
    }
    .task-modal__block {
        margin-bottom: 20px;
    }
    .task-modal__label {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: block;
    }
    .task-modal__description {
        color: var(--text);
        line-height: 1.6;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-break: break-word;
    }
    .subtasks {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .subtask {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        border-radius: 8px;
        background: var(--surface);
        font-size: 0.9rem;
    }
    .subtask--checkable {
        cursor: pointer;
        transition: all var(--transition);
    }
    .subtask--checkable:hover {
        background: color-mix(in srgb, var(--primary) 8%, var(--surface));
    }
    .subtask.is-completed {
        opacity: 0.65;
    }
    .subtask__left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
    }
    .subtask__text {
        flex: 1;
        min-width: 0;
        word-break: break-word;
    }
    .subtask.is-completed .subtask__text {
        text-decoration: line-through;
    }
    .subtask input[type="checkbox"] {
        cursor: pointer;
        flex-shrink: 0;
    }
    .task-modal__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 16px 20px;
        border-top: 1.5px solid var(--border-color);
    }
    @media (max-width: 640px) {
        .modal-dialog, .modal-dialog--task {
            width: 100%;
            max-height: calc(100vh - 24px);
        }
        .task-modal__actions .button {
            width: 100%;
        }
    }

    /* ── Week time gutter ── */
    :root { --gutter-w: 48px; }

    .cal-time-gutter {
        display: block;
    }

    .cal-week-gutter {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 6px 8px 0 0;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-secondary);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        min-height: 56px;
        background: var(--surface);
    }

    .cal-cell--week-row {
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 4px 5px;
        min-height: 56px;
        cursor: pointer;
        transition: background var(--transition);
        overflow: hidden;
    }

    .cal-cell--week-row:nth-child(8n) { border-right: none; }
    .cal-cell--week-row:hover { background: color-mix(in srgb, var(--primary) 4%, transparent); }
    .cal-cell--week-row.is-today { background: color-mix(in srgb, var(--primary) 6%, transparent); }
    .cal-cell--week-row.is-selected { background: color-mix(in srgb, var(--primary) 10%, transparent); }

    @media (max-width: 860px) {
        .cal-sidebar { display: none; }
        .cal-page { height: auto; }
        .cal-grid { overflow-y: visible; }
        .cal-cell { min-height: 64px; }
    }

    @media (max-width: 560px) {
        .cal-nav { gap: 6px; }
        .cal-nav__title { min-width: 0; font-size: 0.95rem; }
        .cal-cell { min-height: 48px; padding: 4px; }
        .cal-chip { display: none; }
        .cal-cell__num { font-size: 0.78rem; width: 22px; height: 22px; }
        .cal-cell.has-events .cal-cell__num::after {
            content: '';
            display: block;
            width: 5px; height: 5px;
            border-radius: 999px;
            background: var(--primary);
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
    }
</style>

<script>
(function () {
    const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    let allTasks = [];
    let currentView = 'month';
    let cursor = new Date();
    cursor.setDate(1);
    cursor.setHours(0,0,0,0);
    let selectedDate = null;

    const grid       = document.getElementById('cal-grid');
    const weekdaysEl = document.getElementById('cal-weekdays');
    const titleEl    = document.getElementById('cal-title');
    const sidebar    = document.getElementById('cal-sidebar');
    const sidebarDate = document.getElementById('sidebar-date');
    const sidebarBody = document.getElementById('sidebar-body');
    const taskModal  = document.getElementById('task-modal');
    const taskModalBody = document.getElementById('task-modal-body');

    // данные загружаются ниже, после объявления всех функций

    // ── Helpers ──
    function toKey(y, m, d) {
        return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function tasksByDate() {
        const map = {};
        allTasks.forEach(t => {
            if (!map[t.date]) map[t.date] = [];
            map[t.date].push(t);
        });
        return map;
    }

    function chipColor(task) {
        if (task.is_completed) return 'color-mix(in srgb, #9aa7bc 14%, var(--surface))';
        const listColors = { active: 'var(--success)', planned: 'var(--primary)', urgent: '#d946ef', favorites: 'var(--warning)' };
        const c = listColors[task.task_list] || task.category_color || 'var(--primary)';
        return `color-mix(in srgb, ${c} 14%, var(--surface))`;
    }
    function chipBorderColor(task) {
        if (task.is_completed) return 'color-mix(in srgb, #9aa7bc 24%, var(--border-color))';
        const listColors = { active: 'var(--success)', planned: 'var(--primary)', urgent: '#d946ef', favorites: 'var(--warning)' };
        const c = listColors[task.task_list] || task.category_color || 'var(--primary)';
        return `color-mix(in srgb, ${c} 24%, var(--border-color))`;
    }

    function pad(n) { return String(n).padStart(2,'0'); }

    // ── Render ──
    function render() {
        currentView === 'month' ? renderMonth() : renderWeek();
        updateWeekdayLabels();
    }

    function updateWeekdayLabels() {
        if (currentView === 'week') return; // renderWeek сам рисует заголовки
        weekdaysEl.style.gridTemplateColumns = '';
        weekdaysEl.innerHTML = DAYS_SHORT.map((d,i) =>
            `<span class="${i >= 5 ? 'cal-weekend' : ''}">${d}</span>`
        ).join('');
    }

    function renderMonth() {
        const y = cursor.getFullYear(), m = cursor.getMonth();
        titleEl.textContent = `${MONTHS[m]} ${y}`;

        const map = tasksByDate();
        const today = new Date(); today.setHours(0,0,0,0);

        // First cell: Monday of the week containing the 1st
        const first = new Date(y, m, 1);
        const dow = first.getDay() === 0 ? 7 : first.getDay(); // 1=Mon..7=Sun
        const startDate = new Date(y, m, 1 - (dow - 1));

        grid.innerHTML = '';
        grid.style.gridTemplateColumns = 'repeat(7, minmax(0, 1fr))';
        weekdaysEl.style.gridTemplateColumns = '';

        // 6 weeks = 42 cells
        for (let i = 0; i < 42; i++) {
            const d = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
            const key = toKey(d.getFullYear(), d.getMonth(), d.getDate());
            const tasks = map[key] || [];
            const isToday = d.getTime() === today.getTime();
            const isOther = d.getMonth() !== m;
            const isSelected = selectedDate === key;

            const cell = document.createElement('div');
            cell.className = 'cal-cell' +
                (isToday ? ' is-today' : '') +
                (isOther ? ' is-other-month' : '') +
                (isSelected ? ' is-selected' : '') +
                (tasks.length ? ' has-events' : '');
            cell.dataset.date = key;

            const numEl = document.createElement('div');
            numEl.className = 'cal-cell__num';
            numEl.textContent = d.getDate();
            cell.appendChild(numEl);

            const eventsEl = document.createElement('div');
            eventsEl.className = 'cal-cell__events';

            const MAX_CHIPS = 3;
            tasks.sort((a,b) => a.time.localeCompare(b.time));
            tasks.slice(0, MAX_CHIPS).forEach(t => {
                const chip = document.createElement('span');
                chip.className = 'cal-chip' + (t.is_completed ? ' cal-chip--done' : '');
                chip.textContent = t.time + ' ' + t.title;
                chip.style.background = chipColor(t);
                chip.style.borderColor = chipBorderColor(t);
                chip.dataset.taskId = t.id;
                chip.addEventListener('click', e => { e.stopPropagation(); openTaskModal(t); });
                eventsEl.appendChild(chip);
            });

            if (tasks.length > MAX_CHIPS) {
                const more = document.createElement('span');
                more.className = 'cal-chip cal-chip--more';
                more.textContent = `+${tasks.length - MAX_CHIPS} ещё`;
                eventsEl.appendChild(more);
            }

            cell.appendChild(eventsEl);
            cell.addEventListener('click', () => selectDay(key, d, tasks));
            grid.appendChild(cell);
        }
    }

    function renderWeek() {
        const today = new Date(); today.setHours(0,0,0,0);
        const dow = cursor.getDay() === 0 ? 7 : cursor.getDay();
        const monday = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() - (dow - 1));
        const sunday = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + 6);

        const mStr = `${monday.getDate()} ${MONTHS_GEN[monday.getMonth()]}`;
        const sStr = `${sunday.getDate()} ${MONTHS_GEN[sunday.getMonth()]} ${sunday.getFullYear()}`;
        titleEl.textContent = `${mStr} — ${sStr}`;

        const map = tasksByDate();

        // Заголовки дней (с временной колонкой-заглушкой)
        weekdaysEl.innerHTML =
            `<span class="cal-time-gutter"></span>` +
            Array.from({length:7}, (_,i) => {
                const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
                const isWe = i >= 5;
                return `<span class="${isWe ? 'cal-weekend' : ''}">${DAYS_SHORT[i]}</span>`;
            }).join('');
        weekdaysEl.style.gridTemplateColumns = 'var(--gutter-w) repeat(7, minmax(0,1fr))';

        // Собираем все часы у которых есть задачи в эту неделю + округляем до часа
        const hourSet = new Set();
        for (let i = 0; i < 7; i++) {
            const key = toKey(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
            (map[key] || []).forEach(t => hourSet.add(Number(t.time.split(':')[0])));
        }
        // Если задач нет — показываем дефолтные часы 8..22
        let hours = hourSet.size ? [...hourSet].sort((a,b) => a-b) : Array.from({length:15},(_,i)=>i+8);

        grid.innerHTML = '';
        grid.style.gridTemplateColumns = 'var(--gutter-w) repeat(7, minmax(0,1fr))';

        hours.forEach(hour => {
            // Метка времени
            const gutter = document.createElement('div');
            gutter.className = 'cal-week-gutter';
            gutter.textContent = `${pad(hour)}:00`;
            grid.appendChild(gutter);

            for (let i = 0; i < 7; i++) {
                const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
                const key = toKey(d.getFullYear(), d.getMonth(), d.getDate());
                const dayTasks = (map[key] || [])
                    .filter(t => Number(t.time.split(':')[0]) === hour)
                    .sort((a,b) => a.time.localeCompare(b.time));
                const isToday = d.getTime() === today.getTime();
                const isSelected = selectedDate === key;

                const cell = document.createElement('div');
                cell.className = 'cal-cell cal-cell--week-row' +
                    (isToday ? ' is-today' : '') +
                    (isSelected ? ' is-selected' : '');
                cell.dataset.date = key;

                const eventsEl = document.createElement('div');
                eventsEl.className = 'cal-cell__events';
                dayTasks.forEach(t => {
                    const chip = document.createElement('span');
                    chip.className = 'cal-chip' + (t.is_completed ? ' cal-chip--done' : '');
                    chip.innerHTML = `<span style="opacity:.7;font-size:.9em;margin-right:3px;">${t.time}</span>${escHtml(t.title)}`;
                    chip.style.background = chipColor(t);
                    chip.style.borderColor = chipBorderColor(t);
                    chip.addEventListener('click', e => { e.stopPropagation(); openTaskModal(t); });
                    eventsEl.appendChild(chip);
                });
                cell.appendChild(eventsEl);
                cell.addEventListener('click', () => {
                    const allDayTasks = (map[key] || []).sort((a,b) => a.time.localeCompare(b.time));
                    selectDay(key, d, allDayTasks);
                });
                grid.appendChild(cell);
            }
        });
    }

    // ── Select day → sidebar ──
    function selectDay(key, date, tasks) {
        selectedDate = key;
        render();

        const dayLabel = `${date.getDate()} ${MONTHS_GEN[date.getMonth()]} ${date.getFullYear()}`;
        sidebarDate.textContent = dayLabel;
        sidebar.classList.remove('is-hidden');

        sidebarBody.innerHTML = '';

        if (!tasks.length) {
            sidebarBody.innerHTML = '<p class="cal-sidebar__empty">Нет задач в этот день</p>';
            return;
        }

        const sorted = [...tasks].sort((a,b) => a.time.localeCompare(b.time));
        sorted.forEach(t => {
            const card = document.createElement('div');
            card.className = 'cal-task-card' + (t.is_completed ? ' cal-task-card--done' : '');

            const listBorderColors = { active: 'var(--success)', planned: 'var(--primary)', urgent: '#d946ef', favorites: 'var(--warning)' };
            const listColor = listBorderColors[t.task_list] || 'var(--primary)';
            const catColor = t.category_color || 'var(--primary)';
            card.style.borderLeftColor = t.category_name ? catColor : listColor;

            let catHtml = '';
            if (t.category_name) {
                catHtml = `<span class="cal-cat-badge" style="background:${catColor}1a;color:${catColor};">
                    <span class="cal-cat-dot" style="background:${catColor};"></span>${t.category_name}
                </span>`;
            }

            const subtaskBadge = !t.is_completed && t.pending_subtasks > 0
                ? `<span class="badge badge--muted" style="font-size:0.72rem;padding:1px 6px;">Подзадач: ${t.pending_subtasks}</span>`
                : '';

            card.innerHTML = `
                <p class="cal-task-card__title" style="display:flex;align-items:center;gap:8px;">
                    <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(t.title)}</span>
                    ${subtaskBadge}
                </p>
                <div class="cal-task-card__meta">
                    <span class="cal-task-card__time">${t.time}</span>
                    ${catHtml}
                    ${t.is_completed ? '<span class="badge badge--success" style="font-size:0.72rem;padding:1px 6px;">Выполнено</span>' : ''}
                </div>
            `;

            card.addEventListener('click', () => openTaskModal(t));
            sidebarBody.appendChild(card);
        });
    }

    // ── Task modal ──
    function openTaskModal(task) {
        const taskTypeLabel = task.is_completed
            ? 'Выполненная задача'
            : 'Активная задача';

        function renderModalBody(subtasks) {
            const hasSubtasks = subtasks && subtasks.length > 0;

            const subtasksContent = hasSubtasks
                ? `<div class="subtasks">
                    ${subtasks.map(subtask => `
                        <div class="subtask subtask--checkable ${subtask.is_completed ? 'is-completed' : ''}" data-subtask-row data-subtask-id="${subtask.id}" data-parent-task-id="${task.id}">
                            <div class="subtask__left">
                                <input type="checkbox" class="subtask-checkbox" data-subtask-id="${subtask.id}" data-parent-task-id="${task.id}" ${subtask.is_completed ? 'checked' : ''}>
                                <span class="subtask__text" data-subtask-text>${subtask.title}</span>
                            </div>
                            <span class="badge ${subtask.is_completed ? 'badge--success' : 'badge--muted'}" data-subtask-badge>
                                ${subtask.is_completed ? 'Выполнено' : 'Не выполнено'}
                            </span>
                        </div>
                    `).join('')}
                  </div>`
                : '<p class="muted" style="margin: 0;">У этой задачи пока нет подзадач.</p>';

            const descriptionContent = task.description
                ? `<p class="task-modal__description" style="margin: 0;">${escHtml(task.description)}</p>`
                : '';

            const completeButton = task.is_completed
                ? `<button type="button" class="button button--success button--small js-complete-task-modal" data-task-id="${task.id}">Восстановить</button>`
                : `<button type="button" class="button button--success button--small js-complete-task-modal" data-task-id="${task.id}">Завершить задачу</button>`;

            taskModalBody.innerHTML = `
                <div class="task-modal__header">
                    <div class="task-modal__header-main">
                        <div class="badge badge--muted" style="width: fit-content;">
                            ${taskTypeLabel}
                        </div>
                        <h3 class="task-modal__title">${escHtml(task.title)}</h3>
                        <p class="task-modal__time">${task.date.split('-').reverse().join('.')} в ${task.time}</p>
                    </div>
                    <button type="button" class="modal-close-button" id="task-modal-close" aria-label="Закрыть окно">×</button>
                </div>
                <div class="task-modal__content">
                    <div class="task-modal__block">
                        <div class="task-modal__label">Описание</div>
                        ${descriptionContent || '<p class="muted" style="margin: 0;">Нет описания</p>'}
                    </div>
                    <div class="task-modal__block">
                        <div class="task-modal__label">Подзадачи</div>
                        ${subtasksContent}
                    </div>
                </div>
                <div class="task-modal__actions">
                    ${completeButton}
                    <a href="${task.edit_url}" class="button button--primary button--small">Редактировать</a>
                    <button type="button" class="button button--primary button--small js-generate-subtasks" data-task-id="${task.id}" data-task-title="${escHtml(task.title)}">Сгенерировать подзадачи</button>
                    <button type="button" class="button button--danger button--small js-delete-task-modal" data-task-id="${task.id}">Удалить</button>
                </div>
            `;

            attachEventHandlers();

            const modalContent = taskModalBody.querySelector('.task-modal__content');
            if (modalContent) {
                const subtasksBlock = modalContent.querySelectorAll('.task-modal__block');
                if (subtasksBlock.length > 0) {
                    attachSubtaskCheckboxListeners(subtasksBlock[subtasksBlock.length - 1]);
                }
            }
        }

        function attachSubtaskCheckboxListeners(container) {
            container.querySelectorAll('.subtask-checkbox').forEach(function (checkbox) {
                checkbox.addEventListener('click', function (event) {
                    event.stopPropagation();
                });
                checkbox.addEventListener('change', function () {
                    const subtaskId = this.dataset.subtaskId;
                    const isChecked = this.checked;
                    fetch(`/subtask/${subtaskId}/toggle/`, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': getCookie('csrftoken') }
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'success') {
                            const row = document.querySelector(`[data-subtask-row][data-subtask-id="${subtaskId}"]`);
                            if (row) {
                                row.classList.toggle('is-completed', data.is_completed);
                                const badge = row.querySelector('[data-subtask-badge]');
                                if (badge) {
                                    badge.className = data.is_completed ? 'badge badge--success' : 'badge badge--muted';
                                    badge.textContent = data.is_completed ? 'Выполнено' : 'Не выполнено';
                                }
                                const text = row.querySelector('[data-subtask-text]');
                                if (text) {
                                    text.style.textDecoration = data.is_completed ? 'line-through' : 'none';
                                    text.style.opacity = data.is_completed ? '0.72' : '1';
                                }
                            }
                        }
                    });
                });
            });
        }

        function attachEventHandlers() {
            const closeBtn = document.getElementById('task-modal-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', closeTaskModal);
            }

            const generateBtn = taskModalBody.querySelector('.js-generate-subtasks');
            if (generateBtn) {
                generateBtn.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    const taskId = this.dataset.taskId;
                    const taskTitle = this.dataset.taskTitle;
                    const oldText = this.textContent;
                    this.disabled = true;
                    this.textContent = 'Генерация...';

                    fetch('/api/generate-subtasks/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({ task_id: taskId, task_title: taskTitle })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'success') {
                            showToast('Подзадачи успешно сгенерированы!', 'success');
                            return fetch(`/api/tasks/${taskId}/subtasks/`);
                        } else {
                            throw new Error(data.message || 'Ошибка генерации подзадач.');
                        }
                    })
                    .then(r => r.json())
                    .then(subtasksData => {
                        const subtasks = subtasksData.subtasks || [];
                        const subtasksBlock = taskModalBody.querySelectorAll('.task-modal__block');
                        if (subtasksBlock.length > 0) {
                            const block = subtasksBlock[subtasksBlock.length - 1];
                            const subtasksContent = subtasks.length > 0
                                ? `<div class="subtasks">
                                    ${subtasks.map(s => `
                                        <div class="subtask subtask--checkable ${s.is_completed ? 'is-completed' : ''}" data-subtask-row data-subtask-id="${s.id}" data-parent-task-id="${taskId}">
                                            <div class="subtask__left">
                                                <input type="checkbox" class="subtask-checkbox" data-subtask-id="${s.id}" data-parent-task-id="${taskId}" ${s.is_completed ? 'checked' : ''}>
                                                <span class="subtask__text" data-subtask-text>${s.title}</span>
                                            </div>
                                            <span class="badge ${s.is_completed ? 'badge--success' : 'badge--muted'}" data-subtask-badge>
                                                ${s.is_completed ? 'Выполнено' : 'Не выполнено'}
                                            </span>
                                        </div>
                                    `).join('')}
                                  </div>`
                                : '<p class="muted" style="margin: 0;">У этой задачи пока нет подзадач.</p>';
                            block.innerHTML = `<div class="task-modal__label">Подзадачи</div>${subtasksContent}`;
                            attachSubtaskCheckboxListeners(block);
                        }
                    })
                    .catch(error => {
                        showToast(error.message || 'Произошла ошибка.', 'danger');
                    })
                    .finally(() => {
                        this.disabled = false;
                        this.textContent = oldText;
                    });
                });
            }

            const completeBtn = taskModalBody.querySelector('.js-complete-task-modal');
            if (completeBtn) {
                completeBtn.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    const taskId = this.dataset.taskId;
                    const wasCompleted = task.is_completed;
                    closeTaskModal();
                    showToast('Задача ' + (wasCompleted ? 'восстанавливается' : 'завершается') + '...', 'success');
                    const endpoint = wasCompleted ? 'restore' : 'complete';
                    setTimeout(() => { window.location.href = `/task/${taskId}/${endpoint}/`; }, 100);
                });
            }

            const deleteBtn = taskModalBody.querySelector('.js-delete-task-modal');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    showConfirmModal(
                        'Удаление задачи',
                        'Вы уверены, что хотите удалить задачу «' + escHtml(task.title) + '»? Это действие необратимо.',
                        function () {
                            fetch('/task/' + task.id + '/delete/', {
                                method: 'POST',
                                headers: { 'X-CSRFToken': getCookie('csrftoken') }
                            })
                            .then(() => {
                                closeTaskModal();
                                allTasks = allTasks.filter(t => t.id !== task.id);
                                render();
                                showToast('Задача «' + escHtml(task.title) + '» удалена!', 'success');
                            })
                            .catch(() => showToast('Ошибка при удалении задачи.', 'danger'));
                        }
                    );
                });
            }
        }

        // Fetch subtasks and render
        fetch(`/api/tasks/${task.id}/subtasks/`)
            .then(r => r.json())
            .then(data => {
                const subtasks = data.subtasks || [];
                renderModalBody(subtasks);
                taskModal.classList.add('is-open');
                taskModal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            })
            .catch(() => {
                renderModalBody([]);
                taskModal.classList.add('is-open');
                taskModal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            });
    }

    function closeTaskModal() {
        taskModal.classList.remove('is-open');
        taskModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
    }

    function showToast(message, type) {
        const area = document.getElementById('toast-area');
        if (!area) return;
        const toast = document.createElement('div');
        toast.className = 'toast toast--' + type;
        toast.innerHTML = '<svg class="toast__icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd"/></svg><span class="toast__body">' + message + '</span><button type="button" class="toast__close" aria-label="Закрыть">\u00d7</button>';
        area.appendChild(toast);
        setTimeout(function () { if (toast.isConnected) { toast.classList.add('is-hiding'); toast.addEventListener('animationend', function () { toast.remove(); }, { once: true }); } }, 4200);
    }

    function showConfirmModal(title, text, onConfirm) {
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop confirm-modal';
        backdrop.setAttribute('aria-hidden', 'false');
        backdrop.style.cssText = 'position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);';
        backdrop.innerHTML = '<div class="panel" style="max-width:420px;width:90vw;"><div class="panel__body"><h3 style="margin:0 0 8px;font-size:18px;">' + title + '</h3><p style="margin:0 0 20px;color:var(--text-secondary);font-size:14px;">' + text + '</p><div style="display:flex;gap:10px;justify-content:flex-end;"><button class="button button--secondary" id="confirm-cancel">Отмена</button><button class="button button--danger" id="confirm-ok">Удалить</button></div></div></div>';
        document.body.appendChild(backdrop);
        document.getElementById('confirm-cancel').addEventListener('click', function () { backdrop.remove(); });
        document.getElementById('confirm-ok').addEventListener('click', function () { backdrop.remove(); onConfirm(); });
        backdrop.addEventListener('click', function (e) { if (e.target === backdrop) backdrop.remove(); });
    }

    taskModal.addEventListener('click', e => { if (e.target === taskModal) closeTaskModal(); });

    // ── Escape ──
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeTaskModal();
    });

    // ── Navigation ──
    document.getElementById('cal-prev').addEventListener('click', () => {
        if (currentView === 'month') {
            cursor.setMonth(cursor.getMonth() - 1);
        } else {
            cursor.setDate(cursor.getDate() - 7);
        }
        render();
    });

    document.getElementById('cal-next').addEventListener('click', () => {
        if (currentView === 'month') {
            cursor.setMonth(cursor.getMonth() + 1);
        } else {
            cursor.setDate(cursor.getDate() + 7);
        }
        render();
    });

    document.getElementById('cal-today').addEventListener('click', () => {
        const now = new Date();
        cursor = new Date(now.getFullYear(), now.getMonth(), 1);
        render();
        const key = toKey(now.getFullYear(), now.getMonth(), now.getDate());
        const map = tasksByDate();
        selectDay(key, now, map[key] || []);
    });

    document.getElementById('btn-month').addEventListener('click', () => {
        currentView = 'month';
        cursor.setDate(1);
        document.getElementById('btn-month').classList.add('is-active');
        document.getElementById('btn-week').classList.remove('is-active');
        render();
    });

    document.getElementById('btn-week').addEventListener('click', () => {
        currentView = 'week';
        document.getElementById('btn-week').classList.add('is-active');
        document.getElementById('btn-month').classList.remove('is-active');
        render();
    });

    document.getElementById('sidebar-close').addEventListener('click', () => {
        selectedDate = null;
        sidebar.classList.add('is-hidden');
        render();
    });

    // ── Utils ──
    function escHtml(s) {
        return String(s ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const _t = new Date();
    const todayKey = toKey(_t.getFullYear(), _t.getMonth(), _t.getDate());

    fetch('/api/tasks/')
        .then(r => r.json())
        .then(data => {
            allTasks = data;
            render();
            const todayTasks = data.filter(t => t.date === todayKey);
            selectDay(todayKey, new Date(), todayTasks);
        });

    // Update sidebar counters every 60 seconds
    function updateSidebarCounters(counters) {
        if (!counters) return;
        Object.keys(counters).forEach(key => {
            const els = document.querySelectorAll(`[data-counter="${key}"]`);
            els.forEach(el => { el.textContent = counters[key] ?? el.textContent; });
        });
    }

    setInterval(function () {
        fetch('/api/tasks-data/')
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    allTasks = data.tasks.concat(data.completed_tasks);
                    render();
                    updateSidebarCounters(data.counters);
                }
            })
            .catch(() => {});
    }, 60000);
})();
</script>
{% endblock %}
