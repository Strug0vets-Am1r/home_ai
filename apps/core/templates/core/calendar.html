{% extends 'core/base.html' %}

{% block title %}Календарь задач{% endblock %}

{% block content %}
<div class="hero">
    <div>
        <div class="eyebrow">Планирование по датам</div>
        <h1 class="hero__title">Календарь задач</h1>
    </div>
    <p class="hero__meta">
        Видно, что нужно сделать сегодня, на неделе и в течение месяца.
    </p>
</div>

<div class="panel panel--glass">
    <div class="panel__head">
        <h2>Календарь</h2>
    </div>
    <div class="panel__body">
        <div id="calendar"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ru.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            locale: 'ru',
            initialView: 'dayGridMonth',
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            events: '/api/tasks/',
            eventClick: function(info) {
                alert('Задача: ' + info.event.title + '\nДата: ' + info.event.start.toLocaleString());
            }
        });
        calendar.render();
    });
</script>
{% endblock %}
