{% extends 'core/base.html' %}

{% block title %}Мои задачи{% endblock %}

{% block topbar %}
<div class="topbar">
    <div style="display: flex; align-items: center; gap: 16px;">
        <h1 class="topbar__title" id="topbar-title">Задачи</h1>
        <button type="button" id="category-filter-toggle" class="button button--primary" style="font-size: 0.9rem; padding: 10px 16px; min-height: auto; height: 36px;">
            Категории
        </button>
    </div>
    {% if user.is_authenticated %}
        <div class="topbar__actions">
            <button type="button" id="clear-completed-btn" class="button button--danger" style="display: none; margin: 0;">Очистить список</button>
            <a href="{% url 'task_create' %}" class="topbar__action-button">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Новая задача
            </a>
            <button type="button" id="topbar-close-btn" class="topbar__close-btn" title="Закрыть" style="display: none;">×</button>
        </div>
    {% endif %}
</div>
{% endblock %}

{% block content %}
<style>
    .task-tiles {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 32px;
    }

    .task-tile {
        position: relative;
        overflow: hidden;
        border-radius: 18px;
        padding: 28px 24px;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        cursor: pointer;
        border: 2px solid;
        background: var(--tile-bg);
        color: var(--tile-color);

        transition: all 200ms cubic-bezier(.2,.8,.2,1);
        text-decoration: none;
        font-family: inherit;
        --tile-color: var(--success);
        --tile-bg: color-mix(in srgb, var(--success) 14%, var(--surface));
        border-color: color-mix(in srgb, var(--success) 24%, var(--border-color));
    }

    .task-tile:hover {
        transform: translateY(-2px);

    }

    .task-tile--planned {
        --tile-color: var(--primary);
        --tile-bg: color-mix(in srgb, var(--primary) 14%, var(--surface));
        border-color: color-mix(in srgb, var(--primary) 24%, var(--border-color));
    }

    .task-tile--favorites {
        --tile-color: var(--warning);
        --tile-bg: color-mix(in srgb, var(--warning) 14%, var(--surface));
        border-color: color-mix(in srgb, var(--warning) 24%, var(--border-color));
    }

    .task-tile--urgent {
        --tile-color: #d946ef;
        --tile-bg: color-mix(in srgb, #d946ef 14%, var(--surface));
        border-color: color-mix(in srgb, #d946ef 24%, var(--border-color));
    }

    .task-tile--completed {
        --tile-color: #9ca3af;
        --tile-bg: color-mix(in srgb, #9ca3af 14%, var(--surface));
        border-color: color-mix(in srgb, #9ca3af 24%, var(--border-color));
    }

    .task-tile--overdue {
        --tile-color: var(--danger);
        --tile-bg: color-mix(in srgb, var(--danger) 14%, var(--surface));
        border-color: color-mix(in srgb, var(--danger) 24%, var(--border-color));
    }

    .task-tile__icon {
        width: 40px;
        height: 40px;
        margin-bottom: 16px;
    }

    .task-tile__label {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 0;
    }

    .task-tile__count {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.02em;
        align-self: flex-end;
    }

    .task-list {
        display: grid;
        gap: 12px;
    }

    .task-item {
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: var(--surface);
        padding: 16px 18px;
        cursor: pointer;
        transition: all 200ms cubic-bezier(.2,.8,.2,1);
    }

    .task-item:hover {

        transform: translateY(-1px);
        border-color: var(--primary);
    }

    .task-item--completed {
        opacity: 0.75;
        background: var(--surface);
    }

    .task-item__top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 14px;
    }

    .task-item__title-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        flex: 1;
        min-width: 0;
    }

    .task-item__title {
        margin: 0;
        font-size: 1.02rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.2;
    }

    .task-item--completed .task-item__title {
        text-decoration: line-through;
        opacity: 0.7;
    }

    .task-item__category {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
    }

    .task-item__time {
        color: var(--text-secondary);
        font-size: 0.92rem;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .task-item__bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 1.5px solid var(--border-color);
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .section-title {
        margin: 32px 0 18px;
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
    }

    .empty-state {
        text-align: center;
        padding: 40px 20px;
        border: 1.5px solid var(--border-color);
        border-radius: 16px;
        background: var(--surface);
    }

    .empty-state__icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        opacity: 0.35;
    }

    .empty-state__title {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
    }

    .empty-state__text {
        margin: 0;
        color: var(--text-secondary);
        font-size: 14px;
    }

    @media (max-width: 768px) {
        .task-tiles {
            grid-template-columns: repeat(2, 1fr);
        }

        .task-tile {
            min-height: 120px;
            padding: 20px 16px;
        }

        .task-tile__icon {
            width: 32px;
            height: 32px;
        }

        .task-tile__label {
            font-size: 14px;
        }

        .task-tile__count {
            font-size: 28px;
        }
    }

    .topbar__close-btn {
        width: 40px;
        height: 40px;
        border: 1.5px solid;
        border-radius: 8px;
        background: color-mix(in srgb, var(--danger) 14%, var(--surface));
        color: var(--danger);
        border-color: color-mix(in srgb, var(--danger) 24%, var(--border-color));
        font-size: 1.4rem;
        cursor: pointer;
        transition: all var(--transition);
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    .topbar__close-btn:hover {
        background: color-mix(in srgb, var(--danger) 20%, var(--surface));
    }

    /* Category Filter Modal */
    .category-filter-modal__dialog {
        position: relative;
        z-index: 1;
        width: min(100%, 340px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        background: var(--surface);
        color: var(--text);
        padding: 16px;
        display: grid;
        gap: 14px;
    }

    .category-filter-modal__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }

    .category-filter-modal__title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
    }

    .category-filter-modal__close {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: color-mix(in srgb, #999 10%, var(--surface));
        color: var(--text-secondary);
        font: inherit;
        font-size: 1.15rem;
        line-height: 1;
        cursor: pointer;
        transition: all 200ms;
    }

    .category-filter-modal__close:hover {
        background: color-mix(in srgb, #999 16%, var(--surface));
        color: var(--text);
    }

    .category-filter-modal__list {
        display: flex;
        flex-direction: column;
        max-height: 50vh;
        overflow-y: auto;
        gap: 0;
    }

    .category-filter-item {
        display: block;
        width: 100%;
        padding: 14px 16px;
        border: none;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.95rem;
        transition: all 200ms;
        text-align: left;
    }

    .category-filter-item:hover {
        background: color-mix(in srgb, var(--primary) 12%, var(--surface));
        color: var(--primary);
        font-weight: 500;
    }

    .category-view {
        display: none;
    }

    .category-view.is-active {
        display: block;
    }

    .category-group {
        margin-bottom: 28px;
    }

    .category-group__title {
        margin: 24px 0 12px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .category-group__items {
        display: grid;
        gap: 12px;
    }
</style>

<!-- Task data for filtering -->
<script id="tasks-data" type="application/json">
{
  "now": "{{ today|date:'c' }}",
  "tasks": [
    {% for task in tasks %}
      {
        "id": {{ task.id }},
        "title": "{{ task.title|escapejs }}",
        "description": "{{ task.description|escapejs }}",
        "due_date": "{{ task.due_date|date:'c' }}",
        "due_date_display": "{{ task.due_date|date:'d.m.Y H:i' }}",
        "is_completed": false,
        "is_favorite": {{ task.is_favorite|lower }},
        "task_list": "{{ task.task_list }}",
        "category": {% if task.category %}{"name": "{{ task.category.name }}", "color": "{{ task.category.color }}"}{% else %}null{% endif %},
        "pending_subtask_count": {{ task.pending_subtask_count }},
        "subtasks": [
          {% for subtask in task.subtasks.all %}
            {
              "id": {{ subtask.id }},
              "title": "{{ subtask.title|escapejs }}",
              "is_completed": {{ subtask.is_completed|lower }}
            }{% if not forloop.last %},{% endif %}
          {% endfor %}
        ]
      }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ],
  "completed_tasks": [
    {% for task in completed_tasks %}
      {
        "id": {{ task.id }},
        "title": "{{ task.title|escapejs }}",
        "description": "{{ task.description|escapejs }}",
        "due_date": "{{ task.due_date|date:'c' }}",
        "due_date_display": "{{ task.due_date|date:'d.m.Y H:i' }}",
        "is_completed": true,
        "category": {% if task.category %}{"name": "{{ task.category.name }}", "color": "{{ task.category.color }}"}{% else %}null{% endif %},
        "pending_subtask_count": 0,
        "subtasks": [
          {% for subtask in task.subtasks.all %}
            {
              "id": {{ subtask.id }},
              "title": "{{ subtask.title|escapejs }}",
              "is_completed": {{ subtask.is_completed|lower }}
            }{% if not forloop.last %},{% endif %}
          {% endfor %}
        ]
      }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>

<!-- Task Tiles -->
<div id="task-tiles-view" class="task-tiles" style="display: none;">
    <button class="task-tile" data-view="active">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        <div class="task-tile__label">Активные</div>
        <div class="task-tile__count">{{ active_count }}</div>
    </button>

    <button class="task-tile task-tile--planned" data-view="planned">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div class="task-tile__label">В планах</div>
        <div class="task-tile__count">{{ planned_count }}</div>
    </button>

    <button class="task-tile task-tile--favorites" data-view="favorites">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        <div class="task-tile__label">Избранные</div>
        <div class="task-tile__count">{{ favorites_count }}</div>
    </button>

    <button class="task-tile task-tile--urgent" data-view="urgent">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="13" r="7"/><polyline points="12 10 12 13 14 15"/><line x1="5" y1="3" x2="2" y2="6"/><line x1="22" y1="6" x2="19" y2="3"/></svg>
        <div class="task-tile__label">Срочные</div>
        <div class="task-tile__count">{{ urgent_count }}</div>
    </button>

    <button class="task-tile task-tile--completed" data-view="completed">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        <div class="task-tile__label">Выполненные</div>
        <div class="task-tile__count">{{ completed_count }}</div>
    </button>

    <button class="task-tile task-tile--overdue" data-view="overdue">
        <svg class="task-tile__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="task-tile__label">Просроченные</div>
        <div class="task-tile__count">{{ overdue_count }}</div>
    </button>
</div>

<!-- Task List View -->
<div id="task-list-view" style="display: none;">
    <button id="back-to-tiles" style="display: none;"></button>
    <h2 class="section-title" id="view-title" style="margin: 0; display: none;">Задачи</h2>
    <div id="filtered-tasks"></div>
</div>

<div id="task-modals-container"></div>

<!-- Category Filter Modal -->
<div id="category-filter-modal" class="modal-backdrop">
    <div class="category-filter-modal__dialog">
        <div class="category-filter-modal__header">
            <h3 class="category-filter-modal__title">Категории</h3>
            <button
                type="button"
                class="category-filter-modal__close"
                id="category-filter-close"
                aria-label="Закрыть"
            >
                ×
            </button>
        </div>

        <div class="category-filter-modal__list">
            {% for category in categories %}
                <button
                    type="button"
                    class="category-filter-item"
                    data-category-id="{{ category.id }}"
                    data-category-name="{{ category.name }}"
                >
                    {{ category.name }}
                </button>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Confirmation Modal -->
<div id="confirm-modal" class="modal-backdrop">
    <div class="modal-dialog confirm-modal__dialog">
        <div class="confirm-modal__content">
            <h2 class="confirm-modal__title" id="confirm-modal-title">Подтверждение</h2>
            <p class="confirm-modal__text" id="confirm-modal-text"></p>
            <div class="confirm-modal__actions">
                <button type="button" class="button button--primary" id="confirm-modal-cancel">Отмена</button>
                <button type="button" class="button button--danger" id="confirm-modal-confirm">Удалить</button>
            </div>
        </div>
    </div>
</div>

<style>
    .modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(9, 13, 20, 0.48);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.18s ease, visibility 0.18s ease;
        z-index: 200;
    }

    .modal-backdrop.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
    }

    .modal-dialog {
        width: min(100%, 520px);
        border-radius: var(--radius-lg);

    }

    .modal-dialog--task {
        width: min(100%, 760px);
        max-height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
    }

    .task-modal__body {
        overflow-y: auto;
        max-height: calc(100vh - 40px);
    }

    .task-modal__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
        position: sticky;
        top: 0;
        background: var(--surface);
        padding-bottom: 8px;
        z-index: 2;
    }

    .task-modal__header-main {
        flex: 1;
    }

    .task-modal__title {
        margin: 8px 0 4px;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
    }

    .task-modal__time {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .modal-close-button {
        width: 38px;
        height: 38px;
        border: 1px solid var(--border-color);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text-secondary);
        font: inherit;
        font-size: 1.25rem;
        line-height: 1;
        cursor: pointer;
        transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        flex: 0 0 auto;
    }

    .modal-close-button:hover {
        background: var(--surface);
        color: var(--text);
    }

    .task-modal__content {
        padding: 20px 20px;
    }

    .task-modal__block {
        margin-bottom: 20px;
    }

    .task-modal__label {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: block;
    }

    .task-modal__description {
        color: var(--text);
        line-height: 1.6;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .subtasks {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .subtask {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        border-radius: 8px;
        background: var(--surface);
        font-size: 0.9rem;
    }

    .subtask--checkable {
        cursor: pointer;
        transition: all var(--transition);
    }

    .subtask--checkable:hover {
        background: color-mix(in srgb, var(--primary) 8%, var(--surface));
    }

    .subtask.is-completed {
        opacity: 0.65;
    }

    .subtask__left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
    }

    .subtask__text {
        flex: 1;
        min-width: 0;
        word-break: break-word;
    }

    .subtask.is-completed .subtask__text {
        text-decoration: line-through;
    }

    .subtask input[type="checkbox"] {
        cursor: pointer;
        flex-shrink: 0;
    }

    .task-modal__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 16px 20px;
        border-top: 1.5px solid var(--border-color);
    }

    @media (max-width: 640px) {

    /* Confirm Modal */
    .confirm-modal__dialog {
        background: var(--surface);
        padding: 24px;
        border-radius: var(--radius-lg);
    }

    .confirm-modal__content {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .confirm-modal__title {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
    }

    .confirm-modal__text {
        margin: 0;
        font-size: 0.95rem;
        color: var(--text-secondary);
        line-height: 1.6;
    }

    .confirm-modal__actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }

    .confirm-modal__actions .button {
        min-width: 100px;
    }
</style>


<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', function () {
        // Toast notification function
        function showToast(message, type = 'success') {
            const toastArea = document.getElementById('toast-area');
            if (!toastArea) return;

            const icons = {
                success: '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>',
                danger: '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>',
                warning: '<path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>',
                info: '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>'
            };

            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            toast.role = 'alert';
            toast.innerHTML = `
                <svg class="toast__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    ${icons[type] || icons.info}
                </svg>
                <span class="toast__body">${message}</span>
                <button type="button" class="toast__close" aria-label="Закрыть">
                    <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                    </svg>
                </button>
            `;

            toastArea.appendChild(toast);

            const closeBtn = toast.querySelector('.toast__close');
            if (closeBtn) {
                closeBtn.addEventListener('click', function () { window.dismissToast(toast); });
            }

            setTimeout(function () {
                if (toast.isConnected) { window.dismissToast(toast); }
            }, 5000);
        }

        // Parse task data
        const tasksDataEl = document.getElementById('tasks-data');
        let tasksData = tasksDataEl ? JSON.parse(tasksDataEl.textContent) : { now: new Date().toISOString(), tasks: [], completed_tasks: [] };
        let now = new Date(tasksData.now);

        // Check if we need to open a modal after reload
        const taskIdToOpen = sessionStorage.getItem('openTaskModal');
        if (taskIdToOpen) {
            sessionStorage.removeItem('openTaskModal');
        }

        function openTaskModal(modal) {
            if (!modal) return;
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeTaskModal(modal) {
            if (!modal) return;
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            sessionStorage.removeItem('openedTaskId');
        }

        function openTaskModalWithData(task) {
            const container = document.getElementById('task-modals-container');
            const modalId = `task-modal-${task.id}`;
            let modal = document.getElementById(modalId);

            if (!modal) {
                const taskTypeLabel = task.is_completed
                    ? 'Выполненная задача'
                    : task.task_list === 'urgent'
                    ? 'Срочная задача'
                    : task.task_list === 'planned'
                    ? 'Запланированная задача'
                    : 'Актуальная задача';

                const descriptionContent = task.description
                    ? `<p class="task-modal__description" style="margin: 0;">${task.description}</p>`
                    : '';

                const subtasksContent = task.subtasks && task.subtasks.length > 0
                    ? `<div class="subtasks">
                        ${task.subtasks.map(subtask => `
                            <div class="subtask subtask--checkable ${subtask.is_completed ? 'is-completed' : ''}" data-subtask-row data-subtask-id="${subtask.id}" data-parent-task-id="${task.id}">
                                <div class="subtask__left">
                                    <input type="checkbox" class="subtask-checkbox" data-subtask-id="${subtask.id}" data-parent-task-id="${task.id}" ${subtask.is_completed ? 'checked' : ''}>
                                    <span class="subtask__text" data-subtask-text>${subtask.title}</span>
                                </div>
                                <span class="badge ${subtask.is_completed ? 'badge--success' : 'badge--muted'}" data-subtask-badge>
                                    ${subtask.is_completed ? 'Выполнено' : 'Не выполнено'}
                                </span>
                            </div>
                        `).join('')}
                      </div>`
                    : '<p class="muted" style="margin: 0;">У этой задачи пока нет подзадач.</p>';

                const completeButton = task.is_completed
                    ? `<button type="button" class="button button--primary button--small js-complete-task-modal" data-task-id="${task.id}">Восстановить</button>`
                    : `<button type="button" class="button button--success button--small js-complete-task-modal" data-task-id="${task.id}">Завершить задачу</button>`;

                const modalHtml = `
                    <div class="modal-backdrop task-modal" id="${modalId}" aria-hidden="true">
                        <div class="modal-dialog modal-dialog--task panel panel--glass" role="dialog" aria-modal="true" aria-labelledby="task-modal-title-${task.id}">
                            <div class="panel__body task-modal__body">
                                <div class="task-modal__header">
                                    <div class="task-modal__header-main">
                                        <div class="badge badge--muted" style="width: fit-content;">
                                            ${taskTypeLabel}
                                        </div>
                                        <h3 id="task-modal-title-${task.id}" class="task-modal__title">
                                            ${task.title}
                                        </h3>
                                        <p class="task-modal__time">
                                            ${task.due_date_display}
                                        </p>
                                    </div>
                                    <button type="button" class="modal-close-button js-close-task-modal" aria-label="Закрыть окно">×</button>
                                </div>
                                <div class="task-modal__content">
                                    <div class="task-modal__block">
                                        <div class="task-modal__label">Описание</div>
                                        ${descriptionContent || '<p class="muted" style="margin: 0;">Нет описания</p>'}
                                    </div>
                                    <div class="task-modal__block">
                                        <div class="task-modal__label">Подзадачи</div>
                                        ${subtasksContent}
                                    </div>
                                    <div class="task-modal__actions">
                                        ${completeButton}
                                        <a href="/task/${task.id}/edit/" class="button button--primary button--small">Редактировать</a>
                                        <button type="button" class="button button--primary button--small js-generate-subtasks" data-task-id="${task.id}" data-task-title="${task.title.replace(/"/g, '&quot;')}">Сгенерировать подзадачи</button>
                                        <button type="button" class="button button--danger button--small js-delete-task-modal" data-task-id="${task.id}">Удалить</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                container.insertAdjacentHTML('beforeend', modalHtml);
                modal = document.getElementById(modalId);

                modal.querySelector('.js-close-task-modal').addEventListener('click', function () {
                    closeTaskModal(modal);
                });

                modal.addEventListener('click', function (event) {
                    if (event.target === modal) {
                        closeTaskModal(modal);
                    }
                });

                // Attach subtask checkbox listeners
                modal.querySelectorAll('.subtask-checkbox').forEach(function (checkbox) {
                    checkbox.addEventListener('click', function (event) {
                        event.stopPropagation();
                    });

                    checkbox.addEventListener('change', function () {
                        const subtaskId = this.dataset.subtaskId;
                        const isChecked = this.checked;

                        fetch(`/subtask/${subtaskId}/toggle/`, {
                            method: 'POST',
                            headers: {
                                'X-CSRFToken': getCookie('csrftoken')
                            }
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'success') {
                                const row = document.querySelector(`[data-subtask-row][data-subtask-id="${subtaskId}"]`);
                                if (row) {
                                    row.classList.toggle('is-completed', data.is_completed);
                                    const badge = row.querySelector('[data-subtask-badge]');
                                    if (badge) {
                                        badge.className = data.is_completed ? 'badge badge--success' : 'badge badge--muted';
                                        badge.textContent = data.is_completed ? 'Выполнено' : 'Не выполнено';
                                    }
                                    const text = row.querySelector('[data-subtask-text]');
                                    if (text) {
                                        text.style.textDecoration = data.is_completed ? 'line-through' : 'none';
                                        text.style.opacity = data.is_completed ? '0.72' : '1';
                                    }
                                }
                            }
                        });
                    });
                });

                // Attach generate subtasks handler
                const generateBtn = modal.querySelector('.js-generate-subtasks');
                if (generateBtn) {
                    generateBtn.addEventListener('click', function (event) {
                        event.preventDefault();
                        event.stopPropagation();

                        const taskId = this.dataset.taskId;
                        const taskTitle = this.dataset.taskTitle;
                        const oldText = this.textContent;

                        this.disabled = true;
                        this.textContent = 'Генерация...';

                        fetch('{% url "api_generate_subtasks" %}', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': getCookie('csrftoken')
                            },
                            body: JSON.stringify({
                                task_id: taskId,
                                task_title: taskTitle
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'success') {
                                showToast('Подзадачи успешно сгенерированы!', 'success');

                                // Fetch updated subtasks from API
                                return fetch(`/api/tasks/${taskId}/subtasks/`);
                            } else {
                                throw new Error(data.message || 'Ошибка генерации подзадач.');
                            }
                        })
                        .then(response => response.json())
                        .then(subtasksData => {
                            // Update task data with new subtasks
                            const taskIndex = tasksData.tasks.findIndex(t => t.id === parseInt(taskId));
                            if (taskIndex >= 0) {
                                tasksData.tasks[taskIndex].subtasks = subtasksData.subtasks;
                                // Update pending subtask count
                                const pendingCount = subtasksData.subtasks.filter(s => !s.is_completed).length;
                                tasksData.tasks[taskIndex].pending_subtask_count = pendingCount;

                                // Update task item in the list if it's visible
                                const taskItemInList = document.querySelector(`.js-task-open[data-modal-target="task-modal-${taskId}"]`);
                                if (taskItemInList) {
                                    const task = tasksData.tasks[taskIndex];
                                    const isOverdue = !task.is_completed && getTaskDayOnly(task.due_date) < today;
                                    const badgeHtml = isOverdue
                                        ? `<span class="badge" style="background: color-mix(in srgb, var(--danger) 14%, var(--surface)); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 24%, var(--border-color));">Просрочено</span>`
                                        : pendingCount > 0
                                        ? `<span class="badge badge--muted">Подзадач: ${pendingCount}</span>`
                                        : `<span class="badge badge--success">Готово к выполнению</span>`;
                                    const bottomSection = taskItemInList.querySelector('.task-item__bottom');
                                    if (bottomSection) {
                                        bottomSection.innerHTML = badgeHtml + '<span>Нажми, чтобы открыть</span>';
                                    }
                                }
                            }

                            // Update subtasks content in the modal without closing it
                            const contentBlock = modal.querySelector('.task-modal__content');
                            const blocks = contentBlock ? contentBlock.querySelectorAll('.task-modal__block') : [];
                            const subtasksBlock = blocks.length > 1 ? blocks[1] : null;

                            if (subtasksBlock) {
                                const subtasksContent = subtasksData.subtasks && subtasksData.subtasks.length > 0
                                    ? `<div class="subtasks">
                                        ${subtasksData.subtasks.map(subtask => `
                                            <div class="subtask subtask--checkable ${subtask.is_completed ? 'is-completed' : ''}" data-subtask-row data-subtask-id="${subtask.id}" data-parent-task-id="${taskId}">
                                                <div class="subtask__left">
                                                    <input type="checkbox" class="subtask-checkbox" data-subtask-id="${subtask.id}" data-parent-task-id="${taskId}" ${subtask.is_completed ? 'checked' : ''}>
                                                    <span class="subtask__text" data-subtask-text>${subtask.title}</span>
                                                </div>
                                                <span class="badge ${subtask.is_completed ? 'badge--success' : 'badge--muted'}" data-subtask-badge>
                                                    ${subtask.is_completed ? 'Выполнено' : 'Не выполнено'}
                                                </span>
                                            </div>
                                        `).join('')}
                                      </div>`
                                    : '<p class="muted" style="margin: 0;">У этой задачи пока нет подзадач.</p>';

                                subtasksBlock.innerHTML = `<div class="task-modal__label">Подзадачи</div>${subtasksContent}`;

                                // Re-attach checkbox listeners for new subtasks
                                subtasksBlock.querySelectorAll('.subtask-checkbox').forEach(function (checkbox) {
                                    checkbox.addEventListener('click', function (event) {
                                        event.stopPropagation();
                                    });

                                    checkbox.addEventListener('change', function () {
                                        const subtaskId = this.dataset.subtaskId;
                                        fetch(`/subtask/${subtaskId}/toggle/`, {
                                            method: 'POST',
                                            headers: {
                                                'X-CSRFToken': getCookie('csrftoken')
                                            }
                                        })
                                        .then(response => response.json())
                                        .then(data => {
                                            if (data.status === 'success') {
                                                const row = document.querySelector(`[data-subtask-row][data-subtask-id="${subtaskId}"]`);
                                                if (row) {
                                                    row.classList.toggle('is-completed', data.is_completed);
                                                    const badge = row.querySelector('[data-subtask-badge]');
                                                    if (badge) {
                                                        badge.className = data.is_completed ? 'badge badge--success' : 'badge badge--muted';
                                                        badge.textContent = data.is_completed ? 'Выполнено' : 'Не выполнено';
                                                    }
                                                    const text = row.querySelector('[data-subtask-text]');
                                                    if (text) {
                                                        text.style.textDecoration = data.is_completed ? 'line-through' : 'none';
                                                        text.style.opacity = data.is_completed ? '0.72' : '1';
                                                    }
                                                }
                                            }
                                        });
                                    });
                                });
                            }
                        })
                        .catch((error) => {
                            showToast(error.message || 'Произошла ошибка.', 'danger');
                        })
                        .finally(() => {
                            this.disabled = false;
                            this.textContent = oldText;
                        });
                    });
                }
            }

            // Attach complete task handler (outside if block so it works for existing modals too)
            const completeBtn = modal.querySelector('.js-complete-task-modal');
            if (completeBtn) {
                completeBtn.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();

                    const taskId = this.dataset.taskId;
                    const wasCompleted = task.is_completed;

                    closeTaskModal(modal);
                    showToast('Задача ' + (wasCompleted ? 'восстанавливается' : 'завершается') + '...', 'success');

                    // Redirect to complete/restore endpoint after a short delay
                    setTimeout(() => {
                        window.location.href = `/task/${taskId}/complete/`;
                    }, 100);
                });
            }

            // Attach delete task handler (outside if block so it works for existing modals too)
            const deleteBtn = modal.querySelector('.js-delete-task-modal');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();

                    if (confirm('Вы уверены, что хотите удалить эту задачу?')) {
                        window.location.href = `/task/${task.id}/delete/`;
                    }
                });
            }

            // Save opened task ID for restoration on page reload
            sessionStorage.setItem('openedTaskId', task.id.toString());
            openTaskModal(modal);
        }

        function getTaskDayOnly(dateStr) {
            const d = new Date(dateStr);
            return new Date(d.getFullYear(), d.getMonth(), d.getDate());
        }

        const nowDate = new Date(now);
        const today = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate());

        function getTasksForView(viewType) {
            const allTasks = [...tasksData.tasks, ...tasksData.completed_tasks];

            switch (viewType) {
                case 'active':
                    return allTasks.filter(t => {
                        if (t.is_completed || t.task_list !== 'active') return false;
                        const dueDay = getTaskDayOnly(t.due_date);
                        return dueDay >= today;
                    });

                case 'planned':
                    return allTasks.filter(t => {
                        if (t.is_completed || t.task_list !== 'planned') return false;
                        const dueDay = getTaskDayOnly(t.due_date);
                        return dueDay >= today;
                    });

                case 'favorites':
                    return allTasks.filter(t => !t.is_completed && t.is_favorite);

                case 'urgent':
                    return allTasks.filter(t => {
                        if (t.is_completed || t.task_list !== 'urgent') return false;
                        const dueDay = getTaskDayOnly(t.due_date);
                        return dueDay >= today;
                    });

                case 'completed':
                    return allTasks.filter(t => t.is_completed);

                case 'overdue':
                    return allTasks.filter(t => {
                        if (t.is_completed) return false;
                        const dueDay = getTaskDayOnly(t.due_date);
                        return dueDay < today;
                    });

                default:
                    return [];
            }
        }

        function renderTaskItem(task) {
            const categoryHtml = task.category
                ? `<span class="task-item__category" style="background-color: ${task.category.color}1a; color: ${task.category.color};">
                     <span style="width: 6px; height: 6px; border-radius: 999px; background-color: ${task.category.color}; display: inline-block;"></span>
                     ${task.category.name}
                   </span>`
                : '';

            const isOverdue = !task.is_completed && getTaskDayOnly(task.due_date) < today;
            const badgeHtml = isOverdue
                ? `<span class="badge" style="background: color-mix(in srgb, var(--danger) 14%, var(--surface)); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 24%, var(--border-color));">Просрочено</span>`
                : task.pending_subtask_count > 0
                ? `<span class="badge badge--muted">Подзадач: ${task.pending_subtask_count}</span>`
                : `<span class="badge badge--success">Готово к выполнению</span>`;

            const titleClass = task.is_completed ? 'task-item--completed' : '';

            const favoriteFlag = task.is_favorite ? `<svg style="width: 18px; height: 18px; flex-shrink: 0;" fill="none" stroke="var(--warning)" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>` : '';

            const html = `
                <article class="task-item ${titleClass} js-task-open" data-modal-target="task-modal-${task.id}" tabindex="0">
                    <div class="task-item__top">
                        <div class="task-item__title-wrap">
                            <h3 class="task-item__title">${task.is_completed ? '<s>' : ''}${task.title}${task.is_completed ? '</s>' : ''}</h3>
                            ${categoryHtml}
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            ${favoriteFlag}
                            <time class="task-item__time">${task.due_date_display}</time>
                        </div>
                    </div>
                    <div class="task-item__bottom">
                        ${badgeHtml}
                        <span>Нажми, чтобы открыть</span>
                    </div>
                </article>
            `;
            return html;
        }

        function showTiles() {
            const tilesView = document.getElementById('task-tiles-view');
            const listView = document.getElementById('task-list-view');
            const topbarTitle = document.getElementById('topbar-title');
            const closeBtn = document.getElementById('topbar-close-btn');

            if (tilesView) tilesView.style.display = 'grid';
            if (listView) listView.style.display = 'none';
            if (topbarTitle) topbarTitle.textContent = 'Задачи';
            if (closeBtn) closeBtn.style.display = 'none';
            window.scrollTo(0, 0);
        }

        function showFilteredView(viewType) {
            const tilesView = document.getElementById('task-tiles-view');
            const listView = document.getElementById('task-list-view');
            const filteredTasks = document.getElementById('filtered-tasks');
            const viewTitle = document.getElementById('view-title');
            const topbarTitle = document.getElementById('topbar-title');
            const closeBtn = document.getElementById('topbar-close-btn');
            const clearBtn = document.getElementById('clear-completed-btn');

            const viewLabels = {
                'active': 'Активные',
                'planned': 'В планах',
                'favorites': 'Избранные',
                'urgent': 'Срочные',
                'completed': 'Выполненные',
                'overdue': 'Просроченные'
            };

            const tasks = getTasksForView(viewType);

            if (tilesView) tilesView.style.display = 'none';
            if (listView) listView.style.display = 'block';

            const label = viewLabels[viewType] || 'Задачи';
            viewTitle.textContent = label;
            if (topbarTitle) topbarTitle.textContent = 'Задачи (' + label + ')';
            if (closeBtn) closeBtn.style.display = 'flex';
            if (clearBtn) clearBtn.style.display = viewType === 'completed' ? 'inline-flex' : 'none';

            if (tasks.length === 0) {
                filteredTasks.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-state__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 15.803a7.5 7.5 0 0 0 10.607 0Z"/></svg>
                        <h3 class="empty-state__title">Нет задач</h3>
                        <p class="empty-state__text">В этой категории пока нет задач</p>
                    </div>
                `;
            } else {
                filteredTasks.innerHTML = `<div class="task-list">${tasks.map(renderTaskItem).join('')}</div>`;

                // Re-attach event listeners for newly rendered tasks
                filteredTasks.querySelectorAll('.js-task-open').forEach(function (card) {
                    card.addEventListener('click', function () {
                        const taskId = this.dataset.modalTarget.split('-').pop();
                        const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(taskId));
                        if (task) {
                            openTaskModalWithData(task);
                        }
                    });
                });
            }

            window.scrollTo(0, 0);
        }

        // Tile click handlers
        document.querySelectorAll('.task-tile').forEach(function (tile) {
            tile.addEventListener('click', function () {
                const viewType = this.dataset.view;
                sessionStorage.setItem('selectedTaskView', viewType);
                showFilteredView(viewType);
            });
        });

        // Restore previous view and modal on page load (synchronously, no setTimeout to avoid flashing)
        const reloadFromSubtaskGen = sessionStorage.getItem('reloadFromSubtaskGen');
        const viewToShow = sessionStorage.getItem('selectedTaskView');
        const openedTaskId = sessionStorage.getItem('openedTaskId');

        if (reloadFromSubtaskGen) {
            // After subtask generation - always restore the view
            sessionStorage.removeItem('reloadFromSubtaskGen');
            if (viewToShow) {
                showFilteredView(viewToShow);

                // If there was an open modal, restore it
                if (openedTaskId) {
                    const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(openedTaskId));
                    if (task) {
                        openTaskModalWithData(task);
                    }
                }
            }
        } else if (taskIdToOpen) {
            // Open modal if specified (legacy, shouldn't happen)
            const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(taskIdToOpen));
            if (task) {
                openTaskModalWithData(task);
            }
        } else if (openedTaskId) {
            // Restore opened task modal on page reload
            if (viewToShow) {
                showFilteredView(viewToShow);

                // Open the modal
                const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(openedTaskId));
                if (task) {
                    openTaskModalWithData(task);
                }
            } else {
                // If no view saved, open the modal directly
                const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(openedTaskId));
                if (task) {
                    openTaskModalWithData(task);
                }
            }
        } else if (viewToShow) {
            // Restore previously viewed list on normal page load
            showFilteredView(viewToShow);
        } else {
            // Default: show tiles
            showTiles();
        }

        // Back button handler (hidden now)
        const backButton = document.getElementById('back-to-tiles');
        if (backButton) {
            backButton.addEventListener('click', function () {
                const tilesView = document.getElementById('task-tiles-view');
                const listView = document.getElementById('task-list-view');
                tilesView.style.display = 'grid';
                listView.style.display = 'none';
                sessionStorage.removeItem('selectedTaskView');
                window.scrollTo(0, 0);
            });
        }

        // Close list view button handler (topbar close button)
        const closeListBtn = document.getElementById('topbar-close-btn');
        if (closeListBtn) {
            closeListBtn.addEventListener('click', function () {
                showTiles();
                sessionStorage.removeItem('selectedTaskView');
                selectedCategoryId = null;
                closeCategoryModal();
            });
        }

        document.querySelectorAll('.js-close-task-modal').forEach(function (button) {
            button.addEventListener('click', function () {
                closeTaskModal(button.closest('.task-modal'));
            });
        });

        document.querySelectorAll('.task-modal').forEach(function (modal) {
            modal.addEventListener('click', function (event) {
                if (event.target === modal) {
                    closeTaskModal(modal);
                }
            });
        });

        document.querySelectorAll('.subtask-checkbox').forEach(function (checkbox) {
            checkbox.addEventListener('click', function (event) {
                event.stopPropagation();
            });

            checkbox.addEventListener('change', function () {
                const subtaskId = this.dataset.subtaskId;
                const isChecked = this.checked;

                fetch(`/subtask/${subtaskId}/toggle/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const row = document.querySelector(`[data-subtask-row][data-subtask-id="${subtaskId}"]`);
                        if (row) {
                            row.classList.toggle('is-completed', data.is_completed);
                            const badge = row.querySelector('[data-subtask-badge]');
                            if (badge) {
                                badge.className = data.is_completed ? 'badge badge--success' : 'badge badge--muted';
                                badge.textContent = data.is_completed ? 'Выполнено' : 'Не выполнено';
                            }
                            const text = row.querySelector('[data-subtask-text]');
                            if (text) {
                                text.style.textDecoration = data.is_completed ? 'line-through' : 'none';
                                text.style.opacity = data.is_completed ? '0.72' : '1';
                            }
                        }
                    }
                });
            });
        });

        document.querySelectorAll('.js-generate-subtasks').forEach(function (button) {
            button.addEventListener('click', function (event) {
                event.preventDefault();
                event.stopPropagation();

                const taskId = this.dataset.taskId;
                const taskTitle = this.dataset.taskTitle;
                const oldText = this.textContent;

                this.disabled = true;
                this.textContent = 'Генерация...';

                fetch('{% url "api_generate_subtasks" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        task_id: taskId,
                        task_title: taskTitle
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showToast('Подзадачи успешно сгенерированы!', 'success');
                    } else {
                        showToast(data.message || 'Ошибка генерации подзадач.', 'danger');
                    }
                })
                .catch(() => {
                    showToast('Произошла ошибка.', 'danger');
                })
                .finally(() => {
                    this.disabled = false;
                    this.textContent = oldText;
                });
            });
        });

        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalTitle = document.getElementById('confirm-modal-title');
        const confirmModalText = document.getElementById('confirm-modal-text');
        const confirmModalCancel = document.getElementById('confirm-modal-cancel');
        const confirmModalConfirm = document.getElementById('confirm-modal-confirm');
        let confirmAction = null;

        function showConfirmModal(title, text, onConfirm) {
            confirmModalTitle.textContent = title;
            confirmModalText.textContent = text;
            confirmAction = onConfirm;
            confirmModal.classList.add('is-open');
        }

        function closeConfirmModal() {
            confirmModal.classList.remove('is-open');
            confirmAction = null;
        }

        confirmModalCancel.addEventListener('click', closeConfirmModal);
        confirmModalConfirm.addEventListener('click', function () {
            if (confirmAction) {
                confirmAction();
            }
            closeConfirmModal();
        });

        confirmModal.addEventListener('click', function (e) {
            if (e.target === confirmModal) {
                closeConfirmModal();
            }
        });

        const clearCompletedBtn = document.getElementById('clear-completed-btn');
        if (clearCompletedBtn) {
            clearCompletedBtn.addEventListener('click', function () {
                showConfirmModal(
                    'Очистить список',
                    'Вы уверены? Все выполненные задачи будут удалены.',
                    function () {
                        fetch('{% url "clear_completed_tasks" %}', {
                            method: 'POST',
                            headers: { 'X-CSRFToken': getCookie('csrftoken') }
                        })
                        .then(response => response.text())
                        .then(() => {
                            const completedCount = tasksData.completed_tasks.length;

                            // Update data
                            tasksData.completed_tasks = [];

                            // Update tile counter for completed tasks
                            const completedTile = document.querySelector('.task-tile--completed');
                            if (completedTile) {
                                const countEl = completedTile.querySelector('.task-tile__count');
                                if (countEl) {
                                    countEl.textContent = '0';
                                }
                            }

                            // Re-render current view if showing completed list
                            const currentView = sessionStorage.getItem('selectedTaskView');
                            if (currentView === 'completed') {
                                showFilteredView('completed');
                            }

                            showToast(`Удалено ${completedCount} задач!`, 'success');
                        })
                        .catch(err => {
                            console.error('Error clearing completed tasks:', err);
                            showToast('Ошибка при очистке списка.', 'danger');
                        });
                    }
                );
            });
        }

        // Check every minute if date changed and sync tasks with database
        let lastCheckedDate = today;
        setInterval(function () {
            const nowDate = new Date(now);
            const currentDate = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate());

            if (currentDate > lastCheckedDate) {
                lastCheckedDate = currentDate;
                today = currentDate;

                // Update overdue tasks in database
                fetch('{% url "update_overdue_tasks" %}', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                })
                .catch(err => console.error('Error updating overdue tasks:', err));
            }

            // Refresh task data from database every minute
            fetch('{% url "api_tasks_data" %}')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    tasksData.tasks = data.tasks;
                    tasksData.completed_tasks = data.completed_tasks;
                    now = new Date(data.now);

                    // Get current view and refresh it
                    const currentView = sessionStorage.getItem('selectedTaskView');
                    if (currentView && currentView !== 'tiles') {
                        showFilteredView(currentView);
                    }

                    // Update all tile counters
                    const tiles = {
                        'active': document.querySelector('.task-tile[data-view="active"] .task-tile__count'),
                        'planned': document.querySelector('.task-tile[data-view="planned"] .task-tile__count'),
                        'urgent': document.querySelector('.task-tile[data-view="urgent"] .task-tile__count'),
                        'favorites': document.querySelector('.task-tile[data-view="favorites"] .task-tile__count'),
                        'completed': document.querySelector('.task-tile[data-view="completed"] .task-tile__count'),
                        'overdue': document.querySelector('.task-tile[data-view="overdue"] .task-tile__count')
                    };

                    Object.keys(tiles).forEach(viewType => {
                        const countEl = tiles[viewType];
                        if (countEl) {
                            const count = getTasksForView(viewType).length;
                            countEl.textContent = count;
                        }
                    });
                }
            })
            .catch(err => console.error('Error fetching tasks data:', err));
        }, 60000); // Check every 60 seconds

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                document.querySelectorAll('.task-modal').forEach(function (modal) {
                    closeTaskModal(modal);
                });
            }
        });

        // Category filter logic
        const categoryFilterToggle = document.getElementById('category-filter-toggle');
        const categoryFilterModal = document.getElementById('category-filter-modal');
        const taskTilesView = document.getElementById('task-tiles-view');
        const taskListView = document.getElementById('task-list-view');
        const filteredTasksContainer = document.getElementById('filtered-tasks');

        console.log('Category filter elements:', {
            toggle: categoryFilterToggle,
            modal: categoryFilterModal
        });

        let selectedCategoryId = null;

        function openCategoryModal() {
            console.log('Opening category modal');
            if (categoryFilterModal) {
                categoryFilterModal.classList.add('is-open');
            }
        }

        function closeCategoryModal() {
            if (categoryFilterModal) {
                categoryFilterModal.classList.remove('is-open');
            }
        }

        function renderCategoryTasks(categoryId, categoryName) {
            const categoryTasks = tasksData.tasks.filter(t => t.category && t.category.name === categoryName);
            const completedCategoryTasks = tasksData.completed_tasks.filter(t => t.category && t.category.name === categoryName);
            const allCategoryTasks = [...categoryTasks, ...completedCategoryTasks];

            if (allCategoryTasks.length === 0) {
                filteredTasksContainer.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-state__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 15.803a7.5 7.5 0 0 0 10.607 0Z"/></svg>
                        <h3 class="empty-state__title">Нет задач</h3>
                        <p class="empty-state__text">В этой категории пока нет задач</p>
                    </div>
                `;
            } else {
                filteredTasksContainer.innerHTML = `<div class="task-list">${allCategoryTasks.map(renderTaskItem).join('')}</div>`;

                // Re-attach event listeners for newly rendered tasks
                filteredTasksContainer.querySelectorAll('.js-task-open').forEach(function (card) {
                    card.addEventListener('click', function () {
                        const taskId = this.dataset.modalTarget.split('-').pop();
                        const task = [...tasksData.tasks, ...tasksData.completed_tasks].find(t => t.id === parseInt(taskId));
                        if (task) {
                            openTaskModalWithData(task);
                        }
                    });
                });
            }

            window.scrollTo(0, 0);
        }

        function showCategoryView(categoryId, categoryName) {
            const topbarTitle = document.getElementById('topbar-title');
            const closeBtn = document.getElementById('topbar-close-btn');

            selectedCategoryId = categoryId;
            taskTilesView.style.display = 'none';
            taskListView.style.display = 'block';

            document.getElementById('view-title').textContent = categoryName;
            if (topbarTitle) topbarTitle.textContent = 'Задачи (' + categoryName + ')';
            if (closeBtn) closeBtn.style.display = 'flex';

            renderCategoryTasks(categoryId, categoryName);
        }


        categoryFilterToggle.addEventListener('click', openCategoryModal);

        const categoryFilterCloseBtn = document.getElementById('category-filter-close');
        if (categoryFilterCloseBtn) {
            categoryFilterCloseBtn.addEventListener('click', closeCategoryModal);
        }

        document.querySelectorAll('#category-filter-modal .category-filter-item').forEach(item => {
            item.addEventListener('click', function() {
                const categoryId = this.dataset.categoryId;
                const categoryName = this.dataset.categoryName;
                showCategoryView(categoryId, categoryName);
                closeCategoryModal();
            });
        });

        categoryFilterModal.addEventListener('click', function(e) {
            if (e.target === categoryFilterModal) {
                closeCategoryModal();
            }
        });
    });
</script>
{% endblock %}
