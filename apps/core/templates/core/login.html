{% extends 'core/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="hero">
    <div>
        <div class="eyebrow">Добро пожаловать</div>
        <h1 class="hero__title">Вход</h1>
    </div>
    <p class="hero__meta">
        Войди в аккаунт, чтобы видеть свои задачи и календарь.
    </p>
</div>

<div class="panel panel--glass" style="max-width: 560px;">
    <div class="panel__body">
        <form method="post" class="form-grid">
            {% csrf_token %}

            <div class="field">
                <label class="field__label" for="username">Имя пользователя</label>
                <input type="text" class="input" id="username" name="username" required>
            </div>

            <div class="field">
                <label class="field__label" for="password">Пароль</label>
                <input type="password" class="input" id="password" name="password" required>
            </div>

            <button type="submit" class="button button--primary">Войти</button>
        </form>

        <p class="muted" style="margin:18px 0 0;">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
