{% extends 'core/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="hero">
    <div>
        <div class="eyebrow">Создание аккаунта</div>
        <h1 class="hero__title">Регистрация</h1>
    </div>
    <p class="hero__meta">
        Создай аккаунт, чтобы начать планировать домашние задачи.
    </p>
</div>

<div class="panel panel--glass" style="max-width: 560px;">
    <div class="panel__body">
        <form method="post" class="form-grid">
            {% csrf_token %}

            <div class="field">
                <label class="field__label" for="username">Имя пользователя</label>
                <input type="text" class="input" id="username" name="username" required>
            </div>

            <div class="field">
                <label class="field__label" for="email">Email</label>
                <input type="email" class="input" id="email" name="email">
            </div>

            <div class="field">
                <label class="field__label" for="password">Пароль</label>
                <input type="password" class="input" id="password" name="password" required>
            </div>

            <div class="field">
                <label class="field__label" for="password2">Подтвердите пароль</label>
                <input type="password" class="input" id="password2" name="password2" required>
            </div>

            <button type="submit" class="button button--primary">Зарегистрироваться</button>
        </form>

        <p class="muted" style="margin:18px 0 0;">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
