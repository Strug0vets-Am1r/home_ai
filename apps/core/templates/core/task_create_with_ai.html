{% extends 'core/base.html' %}

{% block title %}Создать задачу с AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Создать задачу с AI</h3>
            </div>
            <div class="card-body">
                <form method="post" id="task-form">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label">Название задачи</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                        <small class="text-muted">Напишите название сложной задачи, AI автоматически создаст все подзадачи</small>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="due_date" class="form-label">Дата и время выполнения</label>
                        <input type="datetime-local" class="form-control" id="due_date" name="due_date" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Сохранить задачу</button>
                    <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
