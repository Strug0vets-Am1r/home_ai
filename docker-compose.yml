services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-home_ai_db}
      POSTGRES_USER: ${DB_USER:-home_ai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-home_ai_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-home_ai_user} -d ${DB_NAME:-home_ai_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-home_ai_user}
      DB_PASSWORD: ${DB_PASSWORD:-home_ai_pass}
      DB_NAME: ${DB_NAME:-home_ai_db}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery:
    build: .
    command: celery -A home_ai worker -l info
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-home_ai_user}
      DB_PASSWORD: ${DB_PASSWORD:-home_ai_pass}
      DB_NAME: ${DB_NAME:-home_ai_db}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
