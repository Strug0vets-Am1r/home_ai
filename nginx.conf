user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Upstream сервисы ──
    upstream task_service {
        server task-service:8000;
    }

    upstream ai_service {
        server ai-service:8002;
    }

    upstream notification_service {
        server notification-service:8003;
    }

    # ── HTTP редирект на HTTPS (при наличии SSL) ──
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Основной сервер ──
    server {
        listen 80;
        server_name _;

        # ── Task Service (основной фронтенд и API) ──
        location / {
            proxy_pass http://task_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # WebSocket поддержка (если будет нужна)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── AI Service API ──
        location /api/subtasks/ {
            proxy_pass http://ai_service/api/subtasks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/cache/ {
            proxy_pass http://ai_service/api/cache/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ai-health {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
        }

        # ── Notification Service API ──
        location /api/notifications/ {
            proxy_pass http://notification_service/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notification-health {
            proxy_pass http://notification_service/health;
            proxy_set_header Host $host;
        }

        # ── Health checks для сервисов ──
        location /health {
            proxy_pass http://task_service/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/ai {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/notifications {
            proxy_pass http://notification_service/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Static файлы (если нужны) ──
        location /static/ {
            proxy_pass http://task_service/static/;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            proxy_pass http://task_service/media/;
            proxy_set_header Host $host;
            expires 7d;
        }

        # ── 404 для неизвестных путей ──
        # error_page 404 /404.html;
    }

    # ── SSL (закомментировано, раскомментируйте при наличии сертификатов) ──
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Остальная конфигурация как выше...
    # }
}
